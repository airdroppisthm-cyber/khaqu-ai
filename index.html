<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhaQu AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eaeaea;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            text-align: center;
        }
        .header h1 {
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .ai-message {
            align-self: flex-start;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .input-container {
            padding: 15px;
            background: rgba(0,0,0,0.3);
            display: flex;
            gap: 10px;
        }
        #userInput {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
        }
        #sendBtn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #00d4ff 0%, #7b2cbf 100%);
            color: white;
            font-weight: bold;
        }
        #sendBtn:disabled { opacity: 0.5; }
        .typing { display: flex; gap: 5px; padding: 15px; }
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #00d4ff;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 KhaQu AI</h1>
        <small>Powered by GPT-4o Mini</small>
    </div>
    
    <div class="chat-container" id="chatContainer">
        <div class="message ai-message">
            Hello! I'm KhaQu AI with real GPT-4 intelligence. Ask me anything!
        </div>
    </div>
    
    <div class="input-container">
        <input type="text" id="userInput" placeholder="Ask me anything..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        // 🔴 PASTE YOUR API KEY HERE BETWEEN THE QUOTES
        const API_KEY = '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'; 
        
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        
        let messages = [
            {role: 'system', content: 'You are KhaQu AI, a helpful, friendly, and knowledgeable assistant. Answer concisely but thoroughly.'}
        ];

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            div.textContent = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message ai-message typing';
            div.id = 'typing';
            div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            chatContainer.appendChild(div);
        }

        function hideTyping() {
            document.getElementById('typing')?.remove();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            
            if (API_KEY === 'PASTE_YOUR_KEY_HERE') {
                alert('Error: You need to paste your API key in the code!');
                return;
            }

            addMessage(text, true);
            userInput.value = '';
            sendBtn.disabled = true;
            showTyping();

            messages.push({role: 'user', content: text});

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + API_KEY,
                        'Content-Type': 'application/json',
                        'HTTP-Referer': window.location.href,
                        'X-Title': 'KhaQu AI'
                    },
                    body: JSON.stringify({
                        model: 'openai/gpt-4o-mini',
                        messages: messages,
                        temperature: 0.7,
                        max_tokens: 1000
                    })
                });

                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }

                const data = await response.json();
                const aiMessage = data.choices[0].message.content;
                
                messages.push({role: 'assistant', content: aiMessage});
                hideTyping();
                addMessage(aiMessage, false);

            } catch (error) {
                hideTyping();
                addMessage('Error: ' + error.message, false);
            }

            sendBtn.disabled = false;
        }
    </script>
</body>
</html>
