<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhaQu Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #00d4ff;
        }
        input {
            width: 80%;
            padding: 15px;
            font-size: 16px;
            border-radius: 25px;
            border: none;
            margin: 20px 0;
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
        }
        .links {
            margin-top: 30px;
            text-align: left;
        }
        .links a {
            display: block;
            color: #00d4ff;
            padding: 10px;
            text-decoration: none;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>
    <h1>🤖 KhaQu Search</h1>
    <p>Smart search assistant</p>
    
    <input type="text" id="query" placeholder="Search anything..." onkeypress="if(event.key==='Enter')search()">
    <button onclick="search()">Search</button>
    
    <div class="links" id="results"></div>

    <script>
        function search() {
            const q = document.getElementById('query').value;
            if (!q) return;
            
            // Open DuckDuckGo in new tab with results
            window.open('https://duckduckgo.com/?q=' + encodeURIComponent(q), '_blank');
            
            // Show quick links
            const results = document.getElementById('results');
            results.innerHTML = '<h3>Quick Links:</h3>' +
                '<a href="https://en.wikipedia.org/wiki/' + encodeURIComponent(q) + '" target="_blank">📚 Wikipedia</a>' +
                '<a href="https://www.youtube.com/results?search_query=' + encodeURIComponent(q) + '" target="_blank">🎥 YouTube</a>' +
                '<a href="https://www.google.com/search?q=' + encodeURIComponent(q) + '" target="_blank">🔍 Google</a>' +
                '<a href="https://www.reddit.com/search/?q=' + encodeURIComponent(q) + '" target="_blank">💬 Reddit</a>';
        }
    </script>
</body>
</html>
