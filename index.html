<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhaQu AI</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eaeaea;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: rgba(0,0,0,0.3);
            padding: 15px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .ai-message {
            align-self: flex-start;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }
        
        .input-container {
            padding: 15px 20px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 10px;
        }
        
        #userInput {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            outline: none;
        }
        
        #userInput::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        #sendBtn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #00d4ff 0%, #7b2cbf 100%);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        #sendBtn:active {
            transform: scale(0.95);
        }
        
        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .typing {
            display: flex;
            gap: 5px;
            padding: 15px;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #00d4ff;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        .offline-badge {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #ff4757;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="offline-badge" id="offlineBadge">Offline</div>
    
    <div class="header">
        <h1>🤖 KhaQu AI</h1>
        <small>Advanced AI Assistant</small>
    </div>
    
    <div class="chat-container" id="chatContainer">
        <div class="message ai-message">
            Hello! I'm KhaQu AI, your advanced assistant. I can answer questions, help with coding, creative writing, analysis, and much more. What would you like to discuss?
        </div>
    </div>
    
    <div class="input-container">
        <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        // Multiple free AI providers for redundancy
        const AI_PROVIDERS = [
            {
                name: 'HuggingFace',
                url: 'https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2',
                headers: {
                    'Content-Type': 'application/json'
                },
                formatBody: (prompt) => JSON.stringify({
                    inputs: `<s>[INST] ${prompt} [/INST]`,
                    parameters: {
                        max_new_tokens: 500,
                        temperature: 0.7,
                        return_full_text: false
                    }
                }),
                parseResponse: (data) => {
                    if (Array.isArray(data) && data[0]?.generated_text) {
                        return data[0].generated_text.trim();
                    }
                    return null;
                }
            },
            {
                name: 'Together AI',
                url: 'https://api.together.xyz/v1/chat/completions',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' // Free tier works without key (limited)
                },
                formatBody: (prompt) => JSON.stringify({
                    model: "mistralai/Mistral-7B-Instruct-v0.2",
                    messages: [{role: "user", content: prompt}],
                    max_tokens: 500,
                    temperature: 0.7
                }),
                parseResponse: (data) => data.choices?.[0]?.message?.content
            }
        ];

        let currentProvider = 0;
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // Handle Enter key
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            div.textContent = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message ai-message typing';
            div.id = 'typingIndicator';
            div.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTyping() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        async function callAI(prompt) {
            const provider = AI_PROVIDERS[currentProvider];
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000);

                const response = await fetch(provider.url, {
                    method: 'POST',
                    headers: provider.headers,
                    body: provider.formatBody(prompt),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const result = provider.parseResponse(data);
                
                if (result) return result;
                
                // Try next provider if this one fails
                currentProvider = (currentProvider + 1) % AI_PROVIDERS.length;
                return await callAI(prompt);
                
            } catch (error) {
                console.error(`${provider.name} failed:`, error);
                
                // Try next provider
                currentProvider = (currentProvider + 1) % AI_PROVIDERS.length;
                
                if (currentProvider !== 0) {
                    return await callAI(prompt);
                }
                
                throw new Error('All AI providers failed');
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Add user message
            addMessage(text, true);
            userInput.value = '';
            sendBtn.disabled = true;
            showTyping();

            try {
                const response = await callAI(text);
                hideTyping();
                addMessage(response, false);
            } catch (error) {
                hideTyping();
                addMessage('Sorry, I encountered an error. Please check your internet connection or try again in a moment.', false);
                console.error(error);
            }

            sendBtn.disabled = false;
            userInput.focus();
        }

        // Check online status
        window.addEventListener('online', () => {
            document.getElementById('offlineBadge').style.display = 'none';
        });
        
        window.addEventListener('offline', () => {
            document.getElementById('offlineBadge').style.display = 'block';
        });

        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(console.error);
        }
    </script>
</body>
  </html>
