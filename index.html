<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhaQu AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eaeaea;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            text-align: center;
        }
        .header h1 {
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .ai-message {
            align-self: flex-start;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .input-container {
            padding: 15px;
            background: rgba(0,0,0,0.3);
            display: flex;
            gap: 10px;
        }
        #userInput {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
        }
        #sendBtn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #00d4ff 0%, #7b2cbf 100%);
            color: white;
            font-weight: bold;
        }
        .error { color: #ff6b6b; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 KhaQu AI</h1>
        <small>Smart Assistant</small>
    </div>
    
    <div class="chat-container" id="chatContainer">
        <div class="message ai-message">
            Hello! I'm KhaQu. I can search the web, answer questions, and help with tasks. What would you like to know?
        </div>
    </div>
    
    <div class="input-container">
        <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // Simple but effective responses
        const knowledgeBase = {
            'hello': 'Hi there! How can I help you today?',
            'hi': 'Hello! What would you like to know?',
            'how are you': 'I am doing great, thanks for asking! How can I assist you?',
            'what is your name': 'I am KhaQu AI, your personal assistant.',
            'who made you': 'I was created by a developer using open-source technology.',
            'what can you do': 'I can search the web, answer questions, help with coding, math, and general knowledge.',
            'help': 'Try asking me to: search [topic], calculate [math], or ask any question!',
            'bye': 'Goodbye! Have a great day!',
            'thank you': 'You are welcome! Happy to help.',
            'thanks': 'You are welcome!'
        };

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            div.textContent = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function searchWeb(query) {
            try {
                // Use DuckDuckGo via CORS proxy
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://html.duckduckgo.com/html/?q=' + query)}`);
                const data = await response.json();
                
                // Parse results from HTML
                const html = data.contents;
                const titles = html.match(/class="result__a"[^>]*>([^<]+)/g) || [];
                
                if (titles.length > 0) {
                    const results = titles.slice(0, 3).map(t => {
                        return t.replace(/class="result__a"[^>]*>/, '').replace(/<[^>]+>/g, '');
                    });
                    return 'Here is what I found:\n\n' + results.join('\n\n');
                }
                return 'No results found. Try a different search term.';
            } catch (e) {
                return 'Search failed. Try: https://duckduckgo.com/?q=' + encodeURIComponent(query);
            }
        }

        function calculate(expr) {
            try {
                // Clean expression
                expr = expr.replace(/[^0-9+\-*/().\s]/g, '');
                const result = Function('"use strict"; return (' + expr + ')')();
                return expr + ' = ' + result;
            } catch (e) {
                return 'Could not calculate. Try: 5 + 3 * 2';
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            userInput.value = '';
            sendBtn.disabled = true;

            const lowerText = text.toLowerCase();
            let response = '';

            // Check for commands
            if (lowerText.startsWith('search ')) {
                const query = text.substring(7);
                addMessage('Searching...', false);
                response = await searchWeb(query);
            } else if (lowerText.startsWith('calculate ')) {
                const expr = text.substring(10);
                response = calculate(expr);
            } else if (knowledgeBase[lowerText]) {
                response = knowledgeBase[lowerText];
            } else {
                // Smart fallback with web search
                response = await searchWeb(text);
            }

            // Remove "Searching..." if present
            const lastMsg = chatContainer.lastElementChild;
            if (lastMsg && lastMsg.textContent === 'Searching...') {
                lastMsg.remove();
            }

            addMessage(response, false);
            sendBtn.disabled = false;
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
